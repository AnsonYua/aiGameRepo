# Priority：越高越重要。多個經驗檔案同時符合時，
# attack_target 和 desperate_play 以 priority 最高者為準。
# score_bonus 在所有符合的檔案間相加。
#
# 註：attack_target: kill 與基礎評分冗餘 — simulate_game.py
# 已優先考慮擊殺（1HP→20, Blocker→18, AP→15+）優於 Base 攻擊（12）。
# 真正的效果是卡片類型加分（+10 command, +5 unit）。
id: late-game-board-control
priority: 7
description: '後期場面已建立：擊殺敵方單位以減輕其攻勢壓力。'
condition:
  turn_min: 8
  my_units_min: 3
  enemy_units_min: 2
effect:
  score_bonus:
  - card_type: command
    bonus: 10
  - card_type: unit
    bonus: 5
