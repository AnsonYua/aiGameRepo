# Priority：越高越重要。多個經驗檔案同時符合時，
# attack_target 和 desperate_play 以 priority 最高者為準。
# score_bonus 在所有符合的檔案間相加。
#
# 註：attack_target: kill 與基礎評分冗餘 — simulate_game.py
# 已優先考慮擊殺（1HP→20, Blocker→18, AP→15+）優於 Base 攻擊（12）。
# +18 command 加分和特定條件（橫置+受傷）才是真正的效果，
# 讓 AI 偏好使用指令卡來尾刀。
id: kill-threat
priority: 9
description: '敵方有虛弱的橫置單位：優先使用指令卡擊殺並攻擊尾刀。'
condition:
  enemy_rested_units_min: 1
  enemy_damaged_units_min: 1
  enemy_units_min: 1
effect:
  score_bonus:
    card_type: command
    bonus: 18
