# 來源：game_20260613_163853_088825 T5-T8 review
# P2 從 T4 起就沒有基地，但直到 T9 才部署手中白 Base。
# 長達 5 回合無基地期間盾牌從 6→0，每回合都暴露在直擊壓力下。
# 教訓：沒有基地時部署基地是生存級優先，不是有餘裕才做的事。
id: deploy-base-when-baseless
priority: 10
description: '若我方基地已被摧毀且手中有基地卡，部署基地是最優先生存行動，優先於部署任何同費單位。理由：①沒有基地時盾牌直接暴露於每次攻擊——傷害先破盾再傷玩家，盾牌消耗速度加倍。②部署基地提供 HP5（或更多）的防禦層吸收傷害，保護盾牌存量。③[Deploy]從盾牌抽 1 張牌，補充手牌資源。④非 EX-Base 的基地每回合可生成 token 攻擊者，增加破盾攻擊次數。計算資源時：部署基地花費 2 資源，即使只剩 2-3 資源，先部署基地再部署最低費單位通常優於全部資源用來部署一隻同費單位然後持續無基地。例外：若本回合可摧毀對手基地或用 Link 單位直擊玩家獲勝，則先求勝再部署基地。'
condition:
  my_base_present: false
  has_base_in_hand: true
  turn_min: 2
