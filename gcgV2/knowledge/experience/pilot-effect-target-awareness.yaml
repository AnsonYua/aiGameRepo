# 來源：game_20260613_144509_606078 turn 7-9
#        game_20260615_143909_766682 turn 8 review
# P2 多次配對 Amuro Ray 到非 Link 單位（Guntank、Guncannon、Aerial），
# 其中 2 次 [When Paired] 效果因對手場上沒有合適的活躍單位而落空。
# P1 Turn 8 部署 ST01-001 時 Predicted Amuro 可橫置對手 slot3 Link Gundam，
# 但當時對手全場 rested，[When Paired] 沒有合法目標，效果落空。
# 教訓：配對前先確認 [When Paired] 目標是 active（未橫置）且符合條件。
id: pilot-effect-target-awareness
priority: 8
description: '駕駛員配對前先檢查 [When Paired] 效果是否有合法目標。合法目標需要同時滿足：①目標是 active（未橫置）狀態——rested 單位通常不能作為干擾類效果的目標；②目標符合卡片文字中的數值條件（如 Amuro Ray 需要對手有 <=5HP 的單位）。若效果無合法目標且配對對象非 Link 機體，保留駕駛員等待更好機會（Link 機體或有 active 目標時機）優於立即配對。如果配對對象是 Link 機體，即使 [When Paired] 無目標，Link 本身讓本回合可攻擊的價值仍大於不配對。'
condition:
  has_unpaired_units: true
  has_matching_pilot_in_hand: false
  enemy_active_units_max: 1
