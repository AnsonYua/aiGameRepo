# 來源：game_20260613_160545_499572 Turn 12 review
# P1 的 Gundam MA Form (6AP) 攻擊了被橫置的 Aerial PS6 (4HP)，
# 而非直接攻擊只剩 1HP 的對手基地。摧毀基地後對手仍保有 6 盾，
# 但後續每次攻擊穿透防禦層都固定破 1 盾，等同 6 回合內必定獲勝。
# 反之，擊殺一隻橫置單位只是讓對手損失一個攻擊者，基地仍在。
# 教訓：對手基地 HP 極低時，即使擊殺單位看似有利，摧毀基地的戰略
# 價值遠大於擊殺單一橫置威脅。
id: lethal-base-priority
priority: 11
description: '對手基地仍存在但 HP ≤2 時，攻擊基地摧毀它永遠優於攻擊橫置敵方單位。原因：摧毀對手的基地能移除其防禦層，之後每次攻擊防禦層固定穿透到盾牌，建立穩定推進。保留 1HP 基地等同讓對手繼續用基地吸收大額傷害。即使摧毀基地後對手仍有盾牌，每回合 1 次攻擊就能穩定破 1 盾，等同建立倒數計時。不要因「對手基地 1HP 但還有盾牌，摧毀不致命」而選擇擊殺單位。摧毀基地比擊殺一隻橫置單位更有推進力。'
condition:
  enemy_base_present: true
  enemy_base_hp_max: 2
  my_active_units_min: 1
  turn_min: 5
