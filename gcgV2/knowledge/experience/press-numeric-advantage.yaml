# 來源：game_20260613_011112_503958 Turn 8-10
# P1 有 3-4 單位 vs P2 2 單位，但連續三回合不攻擊，理由是「交換不利」。
# 結果：P2 在 Turn 11 部署 Aerial PS6（AP4/HP4）扳回局面。
# 教訓：人數優勢時不要因局部交換不利而放棄攻擊——拖延的代價是讓對手發展。
id: press-numeric-advantage
priority: 8
description: '當我方場上單位數明顯多於對手時，應立即攻擊。即使個別交換看似不利（如低攻單位被Blocker交換），人數優勢代表部分攻擊會穿過，累積傷害會迫使對手被動防守。多等一回合，對手就可能抽出高費威脅扭轉局面。❌ 不要以「交換不利」為由讓過。'
condition:
  my_units_min: 3
  enemy_units_max: 2
