description: '手上駕駛員有 [Attack] 觸發效果時，避免配對到「不能攻擊玩家」的機體。[Attack]效果的價值來自於攻擊防禦層（破盾/推直擊）時產生的節奏優勢——配對到只能攻擊單位的機體等同把這個效果降級為「交換時才可能觸發」。若場上唯一的未配對機體有攻擊限制，保留駕駛員在手牌等待更好的目標，優於為了立刻的 AP/HP 加成而浪費效果。'
