      pair st01/ST01-010 my_slot_1: 配對到 st01/ST01-005：非 Link 配對（該機體 Link 名單：無），AP+2/HP+1
      pair st01/ST01-010 my_slot_2: 配對到 st01/ST01-005：非 Link 配對（該機體 Link 名單：無），AP+2/HP+1
      pair st01/ST01-011 my_slot_0: 配對到 st01/ST01-003：非 Link 配對（該機體 Link 名單：Kai Shiden），AP+1/HP+2
      pair st01/ST01-011 my_slot_1: 配對到 st01/ST01-005：非 Link 配對（該機體 Link 名單：無），AP+1/HP+2
      pair st01/ST01-011 my_slot_2: 配對到 st01/ST01-005：非 Link 配對（該機體 Link 名單：無），AP+1/HP+2
