        必須是 pair，不是第二個 deploy。部署 Link Unit 前要預先計算：部署用的 cost + 配對用的 cost（Pilot 的 cost）。若部署後剩餘
        active resources 不足以支付 Pilot 的 cost（=Pilot 的 cost 值，通常是 1），則該單位本回合無法完成 Link、不能攻擊——不要把這個單位當作本回合
        lethal 的一部份。若資源足夠，部署 Link Unit 後立即執行 pair 指令完成 Link，讓該單位本回合獲得攻擊能力。若先把剩餘資源花在部署第二個單位，可能導致資源不足無法配對，Link
