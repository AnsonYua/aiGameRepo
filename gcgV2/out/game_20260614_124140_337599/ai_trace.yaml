    你必須從 user prompt 的 `legal_commands` 清單中逐字複製 1 條指令。

    請只輸出兩行：

    CONSIDER: <公開安全的短理由>

    COMMAND: <從 legal_commands 逐字複製的指令>

    CONSIDER 必須使用繁體中文，只能描述公開安全的局勢、節奏、攻防或交換考量，

    不得提到對手隱藏手牌、牌庫內容、盾牌內容或推理鏈。

    不要輸出 JSON、不要輸出 markdown 區塊、不要輸出多餘段落。


    決策前依以下順序檢查：

    1. 斬殺：對手盾牌為 0 且基地不存在 → `attack ... opponent_base` 直擊玩家立即獲勝。

