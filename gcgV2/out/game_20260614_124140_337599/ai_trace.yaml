    3. 進攻優先序：攻擊對手防禦層 > 擊殺 rested 威脅 > 清 Blocker > 部署場面。

    4. 防守優先序：重建基地 > 部署 Blocker > 移除/橫置威脅單位。

    5. `attack_annotations` 欄位有每個攻擊的計算結果預覽，先看再選。'
