      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/defend-low-base.yaml
    - id: kill-threat
      summary: 敵方有虛弱的橫置單位：優先使用指令卡擊殺並攻擊尾刀。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/kill-threat.yaml
    - id: board-crowded
      summary: 戰區接近全滿：偏好使用指令卡和部署駕駛員到現有單位，而非填滿空格。
