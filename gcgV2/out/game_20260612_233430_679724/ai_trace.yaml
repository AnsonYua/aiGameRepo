    rule_excerpts:
    - cr_id: CR-2.7
      text: Main 階段可部署 Unit、配對 Pilot、使用 Command 卡、部署基地與宣告攻擊。
    - cr_id: CR-3.1
      text: Level = active + rested + ex 資源總數。
    - cr_id: CR-5.1
      text: 攻擊目標只能是對手玩家（防禦層）或 rested 的敵方 Unit。
    - cr_id: CR-4.1
      text: 攻擊防禦層時，傷害順序為 Base → 盾牌 → 玩家。
    - cr_id: CR-5.2
      text: Unit 部署當回合不能攻擊，除非與對應 Pilot 達成 Link。
    strategy_notes:
    - 前期優先建立場面；對手防禦層薄時優先推進傷害。
    - 若已有可攻擊的單位，不要無限制地只做部署。
    - 若基地壓力高，優先部署有 Blocker 的單位。
    - Pilot 配對能提升 AP/HP 並可能達成 Link（部署當回合可攻擊）。
    - 攻擊目標只能選 rested 的敵方單位或對手防禦層；active 的敵方單位不能被指定，legal_commands 之外的攻擊都不合法。
    - 對手場上有 active 的 <Blocker> 單位時，你的攻擊可能被改向到該 Blocker；宣告攻擊前先評估被阻擋後的交換結果。
    - 若 legal_commands 中有 `activate_effect base`，那通常是免費價值（例如生成 token），優先評估而不是直接 pass。
    experience_summaries:
    - id: early-game-rush
      summary: 前期：積極部署單位，在對手站穩陣腳前搶佔場面。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/early-game-rush.yaml
    - id: defend-low-base
      summary: Base ≤2 HP 且敵方有單位：優先部署阻擋者並擊殺敵方攻擊者。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/defend-low-base.yaml
    - id: kill-threat
      summary: 敵方有虛弱的橫置單位：優先使用指令卡擊殺並攻擊尾刀。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/kill-threat.yaml
    - id: board-crowded
      summary: 戰區接近全滿：偏好使用指令卡和部署駕駛員到現有單位，而非填滿空格。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/board-crowded.yaml
