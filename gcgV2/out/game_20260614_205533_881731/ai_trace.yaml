    rule_excerpts:
    - cr_id: CR-2.7
      text: Main 階段可部署 Unit、配對 Pilot、使用 Command 卡、部署基地與宣告攻擊。
    - cr_id: CR-3.1
      text: Level = active + rested + ex 資源總數。
    - cr_id: CR-5.1
      text: 攻擊目標只能是對手玩家（防禦層）或 rested 的敵方 Unit。
    - cr_id: CR-4.1
      text: 攻擊防禦層時，傷害順序為 Base → 盾牌 → 玩家。
    - cr_id: CR-7.4
      text: Base 破壞不等於敗北；但對手盾牌也為 0 時，攻擊防禦層的傷害會直擊玩家。
    - cr_id: CR-9.1
      text: 敗北條件：盾牌為 0 且戰鬥傷害直擊玩家時，該玩家立即敗北。
    - cr_id: CR-5.2
      text: Unit 部署當回合不能攻擊，除非與對應 Pilot 達成 Link。
    - cr_id: CR-4.4
      text: Start 階段：該回合玩家的所有 Unit 恢復 active（橫置→重置）。橫置效果只在施加者的回合內持續；Rest 對手 Unit 後若不在同回合內進攻，該效果就沒有戰術價值。
    strategy_notes:
    - 先檢查斬殺：(a) 若對手盾牌為 0 且沒有基地，任何一次成功的 `attack ... opponent_base` 都會直擊玩家並立即獲勝；此時直擊玩家優先於擊殺單位、清場或部署。(b)
      若對手基地仍存在但 HP 極低（≤2），攻擊並摧毀基地移除其防禦層：之後每次攻擊防禦層都固定穿越到盾牌，建立穩定推進。摧毀低 HP 基地的戰略價值遠大於擊殺橫置單位；溢出傷害不會穿透到盾牌仍是值得的。
    - 計算「本回合能否摧毀對手基地」時，不只算場上已有活躍單位的攻擊力。若手牌中有 Link Unit + 對應 Pilot 且資源足夠，部署+配對 Link
      後該單位本回合即可攻擊——把這個攻擊力也加入本回合總輸出計算。若總和 ≥ 對手基地剩餘 HP，部署 Link 組合並攻擊基地是最優策略；不要只因為場上沒有活躍單位就放棄斬殺念頭。
    - 部署單位到 slot 前，先比較手牌中所有可部署選項的：AP（攻擊力）、HP、Link 潛力、特殊效果。不要先部署弱單位再用弱單位佔 slot——每個
      slot 是有限的資源，先部署最強或最具協同效應的選項（如 Link Unit + Pilot、或 [During Pair] 提供全局增益的單位）。先部署弱單位會排擠更強組合的上場機會，且配對駕駛員給無
      Link 單位往往是浪費。
    - 部署 Link Unit 後不要立刻結束主要階段。完整的 In-Turn Link 流程：①部署 Link Unit → ②配對對應的 Link Pilot（`pair`
      指令，記得檢查 `pair_annotations`）→ ③Link Unit 本回合即可攻擊 → ④攻擊對手足夠後再結束主要階段。缺少任何一步都會讓該
      unit 本回合無法攻擊。若資源足夠，永遠優先完成 Link 組合再考慮結束回合。
    - 前期優先建立場面；對手防禦層薄時優先推進傷害。
    - 若已有可攻擊的單位，不要無限制地只做部署。
    - 若基地壓力高，優先部署有 Blocker 的單位。
    - 手牌管理：不要因為資源（active cards）足夠就把手牌中的威脅一次出完。保留手牌作為後續回合的補充與應變空間；若場上已有足夠場面壓力，保留額外威脅優於全部打出，避免對手清除場面後無後續卡牌可部署。手牌所剩無幾且無法在本回合獲勝時，優先保留手牌備用。
    - Pilot 配對能提升 AP/HP 並可能達成 Link（部署當回合可攻擊）。配對前先看 `pair_annotations`：同一張 Pilot 通常優先配對到標示為
      Link 配對的機體，而不是任意機體。
    - 攻擊目標只能選 rested 的敵方單位或對手防禦層；active 的敵方單位不能被指定，legal_commands 之外的攻擊都不合法。
    - 對手場上有 active 的 <Blocker> 單位時，你的攻擊可能被改向到該 Blocker；宣告攻擊前先評估被阻擋後的交換結果。但 Blocker
      每次阻擋需橫置且一次只能改向一隻攻擊者：若你的攻擊力足以擊殺該 Blocker（AP ≥ 其剩餘 HP），即使同歸於盡通常也是有利交換，之後其他攻擊者就能直接打防禦層。
    - Main 階段若沒有其他有價值的行動（無可部署、無可配對、無可用 Command），讓 active 攻擊者整回合閒置通常劣於攻擊；選 `pass` 前要先確認每一個攻擊選項都真的不利，而不是只因對手有
      Blocker 就放棄進攻。
    - 若 legal_commands 中有 `activate_effect base`，那通常是免費價值（例如生成 token），優先評估而不是直接 pass。對手基地已毀時，部署手中基地卡可取得：①新基地吸收傷害保護盾牌；②[Deploy]從盾牌抽1牌；③[Activate]每回合生成
      token 增加破盾攻擊次數。
    - 若我方基地已被摧毀且手中有基地卡，部署基地是最優先生存行動，優先於部署任何同費單位。沒有基地時盾牌直接暴露於每次攻擊，傷害先破盾再傷玩家；部署基地提供
      HP5 防禦層吸收傷害保護盾牌，[Deploy]抽 1 盾補充手牌，且非 EX-Base 基地每回合可生成 token。不要為了多部署一隻單位而延後基地部署。
    - 使用 [Deploy] 或 Command 效果前，先確認效果能產生的實際戰術利益。橫置(Rest)效果只持續到對手回合的 Start 階段（對手 Unit
      會恢復 active），Rest 後若不在同回合內攻擊讓該 Unit 無法阻擋，則 Rest 等同無效。AP 減少效果若寫明「本回合」則只在當前回合有效——你在自己回合讓對手
      Unit AP-3，對手 Unit 在你的回合不會攻擊或阻擋，該效果在對手回合開始時消失，完全沒有戰術價值。不要為了觸發效果而觸發：若效果無法在同回合內改變實質戰局（阻擋、攻擊、交換），保留資源優於浪費。
    - 同一張卡同時出現 `pair`（當 Pilot 配對）與 `play_card`（當 Command 使用）時，先比較兩種用法的價值再選：配對提供永久
      AP/HP 加成，多半優於一次沒有實際作用的效果。
    - 駕駛員的[When Paired]效果是戰術資產：配對前先看該效果是否能在對手場上找到合法目標（例如 Amuro Ray 需要 ≤5HP 的活躍單位）。若目前沒有目標或目標存活價值低，保留駕駛員等待更好的配對機會（Link
      機體或有目標可用的時機）通常優於立即配對到沒有 Link 的單位上。
    - 配對駕駛員前，先評估駕駛員的效果與目標機體的攻擊能力是否 synergy：若駕駛員有 [Attack] 觸發效果（攻擊時獲得某種增益），配對到「不能攻擊玩家」的機體會大幅降低該效果的價值。AP/HP加成雖好，但浪費駕駛員效果得不償失。
    - 優先考慮能攻擊對手的機體部署和保留：若場上唯一的未配對機體有「不能攻擊玩家」限制，慎重將 Pilot 配到其上，尤其當該 Pilot 的價值來自攻擊觸發效果時。
    - '`play_card` 指令的格式依卡牌類型不同：基地卡(Base) → `play_card <card_id>`（無插槽）；單位卡(Unit) →
      `play_card <card_id> <slot>`（需插槽號碼）；指令卡(Command) → `play_card <card_id>`（無插槽）。同一種
