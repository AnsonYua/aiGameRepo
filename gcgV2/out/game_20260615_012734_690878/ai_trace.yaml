    strategy_notes:
    - 若我方盾牌為 0 且沒有基地，被直擊就立即敗北；有可用 Blocker 時必須優先阻擋。
    - 若不阻擋會讓對手直接推進防禦層或擊破關鍵單位，優先考慮阻擋。
    - 盾牌是消耗性資源，Blocker 是可重複使用的防守資產。評估是否阻擋時，先檢查自身盾牌數：
    - '  - 盾牌 ≥3：讓小攻擊（AP≤3）通過，用 1 盾吸收比損失 Blocker 划算。Blocker 留著應付更大的威脅。'
    - '  - 盾牌 1-2：評估攻擊者價值。若攻擊者是高費威脅或能決定勝負，Block；否則仍優先保留盾牌。'
    - '  - 盾牌 0：有 Blocker 必須擋，除非攻擊者完全無害（AP=0）。'
    - 考量成本交換比：用高費 Blocker 去換低費攻擊者是負面交換，即使單位存活也是虧損。不阻擋最多損失 1 面盾牌，阻擋可能損失整個 Blocker 單位。
    block_annotations:
      block my_slot_1: 我方 1 號位（1/1）與對手攻擊者 1 號位（2/2）互相造成傷害：我方 Blocker 被擊破；對手攻擊者 存活
    experience_summaries:
    - id: deploy-strongest-first
      summary: 在主要階段部署單位時，不要先部署弱單位再用弱單位佔 slot。若手牌中有多個可部署選項（包含 Pilot 與其對應的 Link Unit），先比較所有選項的：①AP（攻擊力越高越好）、②HP（生存性）、③Link
        潛力（部署+配對後本回合即可攻擊）、④特殊效果（全局增益如 [During Pair] 全體 AP+1、部署效果、即時殺傷）。優先將飛行甲板 slot
        留給最強或最具協同效應的組合；先部署弱單位會佔用 slot 並排擠更強部署。若已有單位在場上但未配對，不要為「配對而配對」——若該單位非 Link
        且配對後無協同效應，保留 Pilot 給未來更強單位優於浪費在弱單位上。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/deploy-strongest-first.yaml
    - id: avoid-pointless-non-link-pair
      summary: 場上有未配對單位且手牌有可配對卡時，若所有未配對單位的 Link 名單均與手牌駕駛員不符（無 Link 可能），且駕駛員無 [When
        Paired] 或 [Attack] 效果可用於該單位，則配對僅提供微幅 AP/HP 加成而無戰術價值。應優先檢查是否能先部署手牌中的 Link 對應單位再配對，或保留駕駛員等待未來更適合的目標。對雙用途卡（可當指令卡或駕駛員），也應比較指令效果是否在此局面有實際作用（例如能否擊殺或橫置敵方單位）。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/avoid-pointless-non-link-pair.yaml
    - id: card-type-placement
      summary: 卡牌類型決定部署區域，不是費用或名稱。Base card 只能放到基地區，指令格式為 `play_card <card_id>`（無插槽）。Unit
        card 只能放到戰鬥區空插槽，指令格式為 `play_card <card_id> <slot>`（需插槽號碼）。若 legal_commands
        中沒有包含該 card_id 的 `play_card` 指令，代表該卡在當前遊戲狀態下無法合法使用（基地已存活無法再部署基地、費用不足、等級不足等），不要自行組合指令。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/card-type-placement.yaml
    - id: pair-when-paired-effect
      summary: 場上有未配對單位且該單位有 [When Paired] 效果（如 AP-3、橫置對手單位）時，即使手牌中的駕駛員不是 Link 配對，配對的價值也遠大於單純使用指令卡。原因：配對觸發單位的
        [When Paired] 效果提供即時控場，同時給予永久 AP/HP 加成，且配對後仍可執行其他行動。而指令效果只有一次性且不一定夠擊殺。此原則在對手有大型威脅時尤其重要。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pair-when-paired-effect.yaml
