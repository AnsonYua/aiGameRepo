      attack my_slot_0 opponent_slot_1:
        if_unblocked: 互相造成傷害：對手 1 號位 被擊破；我方 0 號位 被擊破
      attack my_slot_1 opponent_base:
        if_unblocked: 破壞對手 1 張盾牌（剩 2 張）
      attack my_slot_1 opponent_slot_0:
        if_unblocked: 互相造成傷害：對手 0 號位 存活（剩 2 HP）；我方 1 號位 被擊破
      attack my_slot_1 opponent_slot_1:
        if_unblocked: 互相造成傷害：對手 1 號位 被擊破；我方 1 號位 被擊破
      attack my_slot_2 opponent_base:
        if_unblocked: 破壞對手 1 張盾牌（剩 2 張）
      attack my_slot_2 opponent_slot_0:
        if_unblocked: 互相造成傷害：對手 0 號位 被擊破；我方 2 號位 存活（剩 2 HP）
      attack my_slot_2 opponent_slot_1:
        if_unblocked: 互相造成傷害：對手 1 號位 被擊破；我方 2 號位 存活（剩 3 HP）
      attack my_slot_3 opponent_base:
        if_unblocked: 破壞對手 1 張盾牌（剩 2 張）
      attack my_slot_3 opponent_slot_0:
        if_unblocked: 互相造成傷害：對手 0 號位 存活（剩 1 HP）；我方 3 號位 被擊破
      attack my_slot_3 opponent_slot_1:
        if_unblocked: 互相造成傷害：對手 1 號位 被擊破；我方 3 號位 存活（剩 1 HP）
    pair_annotations:
