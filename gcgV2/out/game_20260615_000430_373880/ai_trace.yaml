      pair st01/ST01-012 my_slot_3: 配對到 st01/ST01-007：非 Link 配對（該機體 Link 名單：Suletta
        Mercury），AP+0/HP+1
      pair st01/ST01-012 my_slot_4: 配對到 st01/ST01-001：非 Link 配對（該機體 Link 名單：Amuro
