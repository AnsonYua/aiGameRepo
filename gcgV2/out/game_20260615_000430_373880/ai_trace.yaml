    - 攻擊目標只能選 rested 的敵方單位或對手防禦層；active 的敵方單位不能被指定，legal_commands 之外的攻擊都不合法。
    - 對手場上有 active 的 <Blocker> 單位時，你的攻擊可能被改向到該 Blocker；宣告攻擊前先評估被阻擋後的交換結果。但 Blocker
      每次阻擋需橫置且一次只能改向一隻攻擊者：若你的攻擊力足以擊殺該 Blocker（AP ≥ 其剩餘 HP），即使同歸於盡通常也是有利交換，之後其他攻擊者就能直接打防禦層。
    - Main 階段若沒有其他有價值的行動（無可部署、無可配對、無可用 Command），讓 active 攻擊者整回合閒置通常劣於攻擊；選 `pass` 前要先確認每一個攻擊選項都真的不利，而不是只因對手有
      Blocker 就放棄進攻。
    - 若 legal_commands 中有 `activate_effect base`，那通常是免費價值（例如生成 token），優先評估而不是直接 pass。對手基地已毀時，部署手中基地卡可取得：①新基地吸收傷害保護盾牌；②[Deploy]從盾牌抽1牌；③[Activate]每回合生成
      token 增加破盾攻擊次數。
    - 若我方基地已被摧毀且手中有基地卡，部署基地是最優先生存行動，優先於部署任何同費單位。沒有基地時盾牌直接暴露於每次攻擊，傷害先破盾再傷玩家；部署基地提供
      HP5 防禦層吸收傷害保護盾牌，[Deploy]抽 1 盾補充手牌，且非 EX-Base 基地每回合可生成 token。不要為了多部署一隻單位而延後基地部署。
    - 使用 [Deploy] 或 Command 效果前，先確認效果能產生的實際戰術利益。橫置(Rest)效果只持續到對手回合的 Start 階段（對手 Unit
      會恢復 active），Rest 後若不在同回合內攻擊讓該 Unit 無法阻擋，則 Rest 等同無效。AP 減少效果若寫明「本回合」則只在當前回合有效——你在自己回合讓對手
      Unit AP-3，對手 Unit 在你的回合不會攻擊或阻擋，該效果在對手回合開始時消失，完全沒有戰術價值。不要為了觸發效果而觸發：若效果無法在同回合內改變實質戰局（阻擋、攻擊、交換），保留資源優於浪費。
    - 同一張卡同時出現 `pair`（當 Pilot 配對）與 `play_card`（當 Command 使用）時，先比較兩種用法的價值再選：配對提供永久
      AP/HP 加成，多半優於一次沒有實際作用的效果。
    - 駕駛員的[When Paired]效果是戰術資產：配對前先看該效果是否能在對手場上找到合法目標（例如 Amuro Ray 需要 ≤5HP 的活躍單位）。若目前沒有目標或目標存活價值低，保留駕駛員等待更好的配對機會（Link
      機體或有目標可用的時機）通常優於立即配對到沒有 Link 的單位上。
    - 配對駕駛員前，先評估駕駛員的效果與目標機體的攻擊能力是否 synergy：若駕駛員有 [Attack] 觸發效果（攻擊時獲得某種增益），配對到「不能攻擊玩家」的機體會大幅降低該效果的價值。AP/HP加成雖好，但浪費駕駛員效果得不償失。
    - 優先考慮能攻擊對手的機體部署和保留：若場上唯一的未配對機體有「不能攻擊玩家」限制，慎重將 Pilot 配到其上，尤其當該 Pilot 的價值來自攻擊觸發效果時。
    - '`play_card` 指令的格式依卡牌類型不同：基地卡(Base) → `play_card <card_id>`（無插槽）；單位卡(Unit) →
      `play_card <card_id> <slot>`（需插槽號碼）；指令卡(Command) → `play_card <card_id>`（無插槽）。同一種
      `play_card` 格式不能跨區域使用。若 legal_commands 沒有包含某張 card_id 的 `play_card` 指令，代表當前狀態下無法合法使用該卡。'
