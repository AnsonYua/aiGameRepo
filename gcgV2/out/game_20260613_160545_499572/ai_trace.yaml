    - Main 階段若沒有其他有價值的行動（無可部署、無可配對、無可用 Command），讓 active 攻擊者整回合閒置通常劣於攻擊；選 `pass` 前要先確認每一個攻擊選項都真的不利，而不是只因對手有
      Blocker 就放棄進攻。
    - 若 legal_commands 中有 `activate_effect base`，那通常是免費價值（例如生成 token），優先評估而不是直接 pass。
    - 使用 Command 卡或效果前，先依 `card_reference` 確認效果有實際作用：回復效果需要已受傷的目標、擊殺/橫置效果需要有意義的目標。效果目前沒有作用時，保留手牌（pass
      或做其他行動）優於浪費資源使用。
    - 同一張卡同時出現 `pair`（當 Pilot 配對）與 `play_card`（當 Command 使用）時，先比較兩種用法的價值再選：配對提供永久
      AP/HP 加成，多半優於一次沒有實際作用的效果。
    - 駕駛員的[When Paired]效果是戰術資產：配對前先看該效果是否能在對手場上找到合法目標（例如 Amuro Ray 需要 ≤5HP 的活躍單位）。若目前沒有目標或目標存活價值低，保留駕駛員等待更好的配對機會（Link
      機體或有目標可用的時機）通常優於立即配對到沒有 Link 的單位上。
    - 配對駕駛員前，先評估駕駛員的效果與目標機體的攻擊能力是否 synergy：若駕駛員有 [Attack] 觸發效果（攻擊時獲得某種增益），配對到「不能攻擊玩家」的機體會大幅降低該效果的價值。AP/HP加成雖好，但浪費駕駛員效果得不償失。
    - 優先考慮能攻擊對手的機體部署和保留：若場上唯一的未配對機體有「不能攻擊玩家」限制，慎重將 Pilot 配到其上，尤其當該 Pilot 的價值來自攻擊觸發效果時。
    pair_annotations:
      pair st01/ST01-012 my_slot_0: 配對到 st01/ST01-003：非 Link 配對（該機體 Link 名單：Kai Shiden），AP+0/HP+1
      pair st01/ST01-012 my_slot_1: 配對到 st01/ST01-009：非 Link 配對（該機體 Link 名單：無），AP+0/HP+1
    experience_summaries:
    - id: temp-debuff-before-attack
      summary: 「本回合結束前降低敵方AP」的卡片只在本回合的戰鬥中有用。❌ 絕對不要在 ① End Phase Action Step（已無戰鬥）、②
        戰鬥Action Step且阻擋已結算或已無阻擋者、③ 主階段使用後直接讓過——使用。這三種情況效果都會在回合結束完全消失，等於無條件燒牌。✅ 正確時機：主階段即將宣告攻擊前
        debuff 對手高攻單位或 Blocker，或戰鬥Action Step 對手尚未決定阻擋前干擾其阻擋判斷。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/temp-debuff-before-attack.yaml
    - id: defend-low-base
      summary: Base ≤2 HP 且敵方有單位：優先部署阻擋者並擊殺敵方攻擊者。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/defend-low-base.yaml
    - id: pair-when-paired-effect
      summary: 場上有未配對單位且該單位有 [When Paired] 效果（如 AP-3、橫置對手單位）時，即使手牌中的駕駛員不是 Link 配對，配對的價值也遠大於單純使用指令卡。原因：配對觸發單位的
        [When Paired] 效果提供即時控場，同時給予永久 AP/HP 加成，且配對後仍可執行其他行動。而指令效果只有一次性且不一定夠擊殺。此原則在對手有大型威脅時尤其重要。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pair-when-paired-effect.yaml
    - id: pilot-effect-target-awareness
      summary: 駕駛員配對前先檢查 [When Paired] 效果是否有合法目標（如 Amuro Ray 需要對手有 ≤5HP 的活躍單位）。若效果無目標且配對對象非
        Link 機體，保留駕駛員等待更好機會（Link 機體或有目標時機）通常優於立即配對。即使有 AP/HP 加成，浪費一次[When Paired]觸發可能就是浪費一次節奏反轉機會。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pilot-effect-target-awareness.yaml
