        效果（如 AP-3、橫置等），配對後立即觸發一次控場效果；（c）配對後仍可進行其他行動。使用指令效果只有一次性，且若傷害不足擊殺等於浪費潛在駕駛員價值。除非指令能直接擊殺關鍵威脅且配對無任何即時效益，否則配對優於指令使用。
