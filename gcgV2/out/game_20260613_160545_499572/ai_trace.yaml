      summary: 對手基地已毀時，每次攻擊防禦層固定破 1 盾。先數回合：我方可攻擊單位數能在 1-2 回合內打穿對手剩餘盾牌時，全部攻擊防禦層通常優於分兵擊殺單位；每改打一隻單位就是把斬殺延後一次攻擊。擊殺單位只在能阻止對手反向斬殺我方時才優先。
