    strategy_notes:
    - 先檢查斬殺：若對手盾牌為 0 且沒有基地，任何一次成功的 `attack ... opponent_base` 都會直擊玩家並立即獲勝；此時直擊玩家優先於擊殺單位、清場或部署。
    - 前期優先建立場面；對手防禦層薄時優先推進傷害。
    - 若已有可攻擊的單位，不要無限制地只做部署。
    - 若基地壓力高，優先部署有 Blocker 的單位。
