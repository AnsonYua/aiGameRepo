      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/kill-threat.yaml
    - id: pair-pilot-immediately
      summary: 場上有未配對的 Link Unit 且手牌有對應駕駛員時，應立即配對。配對後可同時獲得兩層效果：(a) 駕駛員的[When Paired]效果（如
        Amuro Ray＝橫置對手HP5以下單位）；(b) Link Unit 的[When Paired]效果（如 Gundam MA Form＝每回合抽1）。多等一回合就是白白損失一次效果觸發。
