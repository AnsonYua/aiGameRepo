      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pilot-over-command.yaml
    - id: pilot-link-focus
      summary: 場上有可配對的 Link Unit 時，優先部署駕駛員以獲得加成。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pilot-link-focus.yaml
    - id: press-board-advantage
      summary: 場上有活躍單位且有敵方單位可攻擊時，應主動攻擊交換，奪取場面控制。即使無法攻擊玩家的單位（如Zowort的「此單位不能選擇敵方玩家為攻擊目標」），仍可攻擊對手單位。讓活躍單位閒置等於浪費節奏優勢。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/press-board-advantage.yaml
