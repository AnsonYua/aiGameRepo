        Amuro Ray＝橫置對手HP5以下單位）；(b) Link Unit 的[When Paired]效果（如 Gundam MA Form＝每回合抽1）。多等一回合就是白白損失一次效果觸發。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pair-pilot-immediately.yaml
    - id: pilot-over-command
