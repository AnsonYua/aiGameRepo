      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/kill-threat.yaml
    - id: pilot-over-command
      summary: 當有空位或無駕駛員的單位時，將雙用途 [Pilot] 卡作為駕駛員部署而非指令使用。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pilot-over-command.yaml
    - id: pilot-link-focus
      summary: 場上有可配對的 Link Unit 時，優先部署駕駛員以獲得加成。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/pilot-link-focus.yaml
