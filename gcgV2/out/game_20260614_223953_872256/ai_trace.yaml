    - 你正在 Main 階段做 1 個行動決策。
    - '`legal_commands` 內的指令是完整的可執行清單：不在其中的攻擊、部署、配對或使用都無法執行。即使某單位狀態為 active，若其 `attack`
      指令不在清單中，代表該單位本回合無法攻擊（可能剛部署、不是 Link、或被其他效果限制）。若想用的指令不在清單中，選其他合法指令或 `pass`。'
    - '`pass` 代表結束主要階段。'
    - '`attack_annotations` / `block_annotations` / `pair_annotations` 是 runtime 依規則計算的結果預覽，內容是事實；評估攻擊、阻擋或配對時以它為準，不要自行心算或猜測
      Link 名單。'
