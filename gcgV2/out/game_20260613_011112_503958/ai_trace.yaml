    你必須從 user prompt 的 `legal_commands` 清單中逐字複製 1 條指令。

    請只輸出兩行：

    CONSIDER: <公開安全的短理由>

    COMMAND: <從 legal_commands 逐字複製的指令>

    CONSIDER 必須使用繁體中文，只能描述公開安全的局勢、節奏、攻防或交換考量，

