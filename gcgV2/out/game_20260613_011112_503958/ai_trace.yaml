    不要輸出 JSON、不要輸出 markdown 區塊、不要輸出多餘段落。


    決策前依以下順序檢查：

    1. 斬殺：對手盾牌為 0 且基地不存在 → `attack ... opponent_base` 直擊玩家立即獲勝。

    2. 防斬殺：己方盾牌 0 且基地不存在，且對手有 active 攻擊者 → 優先部署或保留 Blocker。

