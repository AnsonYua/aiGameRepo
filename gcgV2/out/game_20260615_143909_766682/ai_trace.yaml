    - id: active-neq-canattack
      summary: 計算 lethal 總攻擊力或選擇攻擊目標時，不能只看單位 status 是否為 active。剛部署且未達成 Link 的單位、有「不能攻擊玩家」限制的單位、或被其他效果限制的單位，即使
        status 是 active，legal_commands 中也不會有對應的 attack my_slot_X ... 指令。注意區分：legal_commands
        清單中的 attack my_slot_X ... 是唯一可執行的攻擊選項；若某單位的 status 是 active 但它對應的 slot 沒有出現在任何
        attack 指令中，代表該單位本回合不能攻擊。CONSIDER 如果說「某 active 單位可直擊獲勝」但該 slot 沒有 attack 指令在
        legal_commands 清單中，這是 hallucination——不要輸出這個結論，改為評估其他合法選項或 pass。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/active-neq-canattack.yaml
    - id: deploy-strongest-first
      summary: 在主要階段部署單位時，不要先部署弱單位再用弱單位佔 slot。若手牌中有多個可部署選項（包含 Pilot 與其對應的 Link Unit），先比較所有選項的：①AP（攻擊力越高越好）、②HP（生存性）、③Link
        潛力（部署+配對後本回合即可攻擊）、④特殊效果（全局增益如 [During Pair] 全體 AP+1、部署效果、即時殺傷）。優先將飛行甲板 slot
        留給最強或最具協同效應的組合；先部署弱單位會佔用 slot 並排擠更強部署。若已有單位在場上但未配對，不要為「配對而配對」——若該單位非 Link
        且配對後無協同效應，保留 Pilot 給未來更強單位優於浪費在弱單位上。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/deploy-strongest-first.yaml
    - id: lethal-straight-line
      summary: 當本回合有足夠攻擊次數和攻擊力完成「破所有盾→直擊玩家獲勝」時，攻擊目標順序應優先於 lethal line：打盾→打盾→直擊。不要在中間插入打
        rested unit、清場、或非必要的交換。rested unit 不會阻擋，不會干擾 lethal 計算；每浪費一次攻擊在 rested unit
        上，就少破一盾、讓對手多一個回合生存。例外情況：如果對手有 active Blocker 且你的攻擊次數不足以繞過 Blocker（打盾需要穿透 Blocker），可以先解除
        Blocker；否則一律走最短 lethal 路徑。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/lethal-straight-line.yaml
    - id: avoid-pointless-non-link-pair
      summary: 場上有未配對單位且手牌有可配對卡時，若所有未配對單位的 Link 名單均與手牌駕駛員不符（無 Link 可能），且駕駛員無 [When
        Paired] 或 [Attack] 效果可用於該單位，則配對僅提供微幅 AP/HP 加成而無戰術價值。應優先檢查是否能先部署手牌中的 Link 對應單位再配對，或保留駕駛員等待未來更適合的目標。對雙用途卡（可當指令卡或駕駛員），也應比較指令效果是否在此局面有實際作用（例如能否擊殺或橫置敵方單位）。
      source: /Users/hello/Desktop/cardAI/gcgV2/knowledge/experience/avoid-pointless-non-link-pair.yaml
